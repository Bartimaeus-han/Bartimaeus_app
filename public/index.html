<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>Main Home</title>
    </head>
    <body>
        <h2>Main Home Dashboard</h2>
        <p>
            Hello,
            <b
                id="username"
                style="
                    font-family:
                        Consolas, monospace; /* 가독성을 위한 고정폭 폰트 (Monospace font for readability) */
                    background-color: #ffeef0; /* 옅은 붉은색 배경 (Light red background) */
                    color: #d63384; /* 붉은 분홍색 텍스트 색상 (Red-pink text color) */
                    padding: 3px 8px; /* 안쪽 여백 (Internal padding) */
                    border-radius: 4px; /* 둥근 테두리 모서리 (Rounded border corners) */
                    border: 1px solid #f8d7da; /* 테두리선 (Border outline) */
                    font-size: 1.05rem; /* 글자 크기 (Font size) */
                    word-break: break-all; /* 긴 쿼리가 넘칠 때 자동 개행 (Wrap text if query is too long) */
                "
                >!</b
            >
        </p>
        <p>current state: Authenticate</p>
        <button
            id="adminBtn"
            style="
                display: none; /* hide this button option */
                background-color: #212529;
                color: white;
                padding: 8px 16px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
            "
            onclick="location.href = '/admin.html'"
        >
            Admin Page
        </button>

        <br />
        <button onclick="logout()">Log Out</button>

        <script>
            // When page loading, request session info inquiry to server
            fetch("/api/me")
                .then(async (res) => {
                    const data = await res.json();

                    // If the loing status is successfully confirmed
                    if (res.ok && data.status === "success") {
                        document.getElementById("username").textContent =
                            data.username;

                        if (data.username == "admin") {
                            document.getElementById("adminBtn").style.display =
                                "inline-block";
                        }
                    } else {
                        // If not logged in or invalid session, redirect to login page
                        alert("please login!");
                        window.location.href = "/login.html";
                    }
                })
                .catch(() => {
                    alert(
                        "Server communication error occurred when checking login status.",
                    );
                    window.location.href = "/login.html";
                });

            function logout() {
                // Send logout POST request to server
                fetch("/logout", {
                    method: "POST",
                })
                    .then((res) => {
                        if (res.ok) {
                            // If logout is successful, redirect to login page
                            window.location.href = "/login.html";
                        } else {
                            alert("Logout failed on server");
                        }
                    })
                    .catch(() => {
                        alert(
                            "Server Communication error occurred during logout.",
                        );
                    });
            }
        </script>
    </body>
</html>
